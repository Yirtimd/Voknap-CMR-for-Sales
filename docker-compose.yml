services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cmr_postgres
    environment:
      POSTGRES_DB: cmr
      POSTGRES_USER: cmr
      POSTGRES_PASSWORD: cmr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmr -d cmr"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:

