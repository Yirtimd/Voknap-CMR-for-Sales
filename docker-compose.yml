services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cmr_postgres
    environment:
      POSTGRES_DB: cmr
      POSTGRES_USER: cmr
      POSTGRES_PASSWORD: cmr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmr -d cmr"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: cmr_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-cmrminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-cmrminio-dev-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmr_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://cmr:cmr@postgres:5432/cmr
      KNOWLEDGE_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_USE_SSL: "false"
      FRONTEND_URL: http://localhost:5173
      PUBLIC_API_BASE_URL: http://localhost:8000
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    profiles: ["production"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: cmr_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12

  integration-worker:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmr_integration_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://cmr:cmr@postgres:5432/cmr
    command: ["python", "-m", "scripts.run_integration_worker"]
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  automation-scheduler:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmr_automation_scheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://cmr:cmr@postgres:5432/cmr
    command:
      [
        "python",
        "-m",
        "scripts.run_automations",
        "--loop",
        "--interval",
        "60",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
